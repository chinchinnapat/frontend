<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Wellcare Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --staff-blue: #0d47a1;
            --staff-accent: #1565c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f7 0%, #dfe9f3 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(13, 71, 161, 0.15);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .staff-icon {
            width: 80px;
            height: 80px;
            background: var(--staff-blue);
            color: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(13, 71, 161, 0.2);
        }

        h2 {
            color: var(--staff-blue);
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--staff-blue);
            outline: none;
            background: #f8fbff;
        }

        .btn-staff-login {
            width: 100%;
            background: var(--staff-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-staff-login:hover {
            background: var(--staff-accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px rgba(13, 71, 161, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--staff-blue);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="staff-icon"><i class="fas fa-user-md"></i></div>
        <h2>สำหรับเจ้าหน้าที่</h2>

        <form id="staffLoginForm">
            <div class="input-group">
                <label>รหัสประจำตัว (Staff ID)</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-badge"></i>
                    <input type="text" name="staff_id" id="staff_id" placeholder="ระบุรหัสเจ้าหน้าที่">
                </div>
            </div>
            <div class="input-group">
                <label>รหัสผ่าน (Password)</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="ระบุรหัสผ่าน">
                </div>
            </div>
            <button type="submit" class="btn-staff-login">เข้าสู่ระบบระบบหลังบ้าน</button>
        </form>

        <a href="../../index.html" class="back-link"><i class="fas fa-arrow-left"></i> กลับหน้าหลัก</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="staff-login.js"></script>
</body>

</html>
