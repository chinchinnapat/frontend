<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Wellcare Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: linear-gradient(135deg, #f0f7ff 0%, #e2eeff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .register-container { background: white; padding: 50px; border-radius: 24px; box-shadow: 0 20px 40px rgba(13, 71, 161, 0.1); width: 100%; max-width: 800px; }
        .register-header { text-align: center; margin-bottom: 40px; }
        .register-header h2 { font-size: 2rem; color: #0d47a1; margin-bottom: 10px; }
        .register-header p { color: #64748b; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: #334155; font-weight: 500; }
        .input-control { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: 0.3s; background: #f8fafc; }
        .input-control:focus { outline: none; border-color: #1a73e8; background: white; }
        textarea.input-control { height: 100px; resize: none; }
        .btn-register-custom { width: 100%; background: #1a73e8; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-register-custom:hover { background: #1557b0; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(26, 115, 232, 0.2); }
        .footer-link { text-align: center; margin-top: 30px; color: #64748b; }
        .footer-link a { color: #1a73e8; text-decoration: none; font-weight: 600; }
        @media (max-width: 600px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-header">
            <h2>ลงทะเบียนคนไข้ใหม่</h2>
            <p>กรุณากรอกข้อมูลตามจริงเพื่อประโยชน์ในการรักษาครับ</p>
        </div>

        <form id="registerForm">
            <div class="grid-layout">
                <div class="form-group">
                    <label class="form-label">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" class="input-control" placeholder="ระบุนาย/นาง/นางสาว/.. ชื่อ และนามสกุล" required>
                </div>
                <div class="form-group">
                    <label class="form-label">เลขบัตรประชาชน (13 หลัก)</label>
                    <input type="text" id="id_card" class="input-control" maxlength="13" placeholder="ใช้เป็นชื่อผู้ใช้งาน" required>
                </div>
            </div>

            <div class="grid-layout">
                <div class="form-group">
                    <label class="form-label">วัน/เดือน/ปี เกิด</label>
                    <input type="date" id="dob" class="input-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">เบอร์โทรศัพท์ (ใช้เป็นรหัสผ่าน)</label>
                    <input type="tel" id="phone" class="input-control" maxlength="10" placeholder="08xxxxxxxx" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">ที่อยู่ปัจจุบัน</label>
                <textarea id="address" class="input-control" placeholder="บ้านเลขที่, ตำบล/แขวง, อำเภอ/เขต..."></textarea>
            </div>

            <div class="grid-layout">
                <div class="form-group">
                    <label class="form-label">โรคประจำตัว</label>
                    <input type="text" id="congenital_disease" class="input-control" placeholder="ระบุ (ถ้าไม่มีใส่ -)">
                </div>
                <div class="form-group">
                    <label class="form-label">ประวัติการแพ้ยา</label>
                    <input type="text" id="allergic_medicine" class="input-control" placeholder="ระบุ (ถ้าไม่มีใส่ -)">
                </div>
            </div>

            <button type="submit" class="btn-register-custom">
                <i class="fas fa-user-plus"></i> ยืนยันการสมัครสมาชิก
            </button>
        </form>

        <div class="footer-link">
            มีบัญชีผู้ใช้งานอยู่แล้ว? <a href="../login/login.html">เข้าสู่ระบบ</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="register.js"></script>
</body>
</html>
