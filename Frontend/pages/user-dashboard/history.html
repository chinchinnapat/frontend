<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการรักษา - Wellcare Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --sidebar-bg: #ffffff;
            --main-bg: #f0f2f5;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --border: #e2e8f0;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--main-bg); display: flex; min-height: 100vh; color: var(--text-dark); }

        /* Sidebar - ถอดแบบจาก Dashboard เป๊ะๆ */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            padding: 20px;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            margin-bottom: 30px;
            color: var(--primary);
            font-weight: 600;
            font-size: 1.2rem;
        }
        .brand img { width: 35px; height: auto; }

        .nav-menu { flex: 1; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text-gray);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: #f0f7ff;
            color: var(--primary);
        }

        .logout-btn { 
            color: #ef4444 !important; 
            margin-top: auto; 
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        /* Main Content Area */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }
        
        /* Card สไตล์เดียวกับ Dashboard */
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .history-header {
            margin-bottom: 30px;
        }
        .history-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        /* History List Item */
        .history-item {
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .history-item:last-child { border-bottom: none; }
        
        .history-info strong {
            display: block;
            font-size: 1rem;
            color: var(--text-dark);
            margin-bottom: 4px;
        }
        .history-info p {
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .btn-view {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .btn-view:hover {
            background: #f0f7ff;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <img src="../../images/wellcare.png" alt="Logo">
            <span>Wellcare Clinic</span>
        </div>
        <nav class="nav-menu">
            <a href="patient-dashboard.html" class="nav-item"><i class="fas fa-columns"></i> ภาพรวม</a>
            <a href="appointment.html" class="nav-item"><i class="fas fa-calendar-alt"></i> นัดหมาย</a>
            <a href="history.html" class="nav-item active"><i class="fas fa-history"></i> ประวัติการรักษา</a>
        </nav>
        <a href="#" onclick="logout()" class="nav-item logout-btn"><i class="fas fa-sign-out-alt"></i> ออกจากระบบ</a>
    </aside>

    <main class="main-content">
        <header class="history-header">
            <h1>ประวัติการรักษา</h1>
            <p style="color: var(--text-gray);">ตรวจสอบข้อมูลการรักษาและใบสั่งยาทั้งหมดของคุณ</p>
        </header>

        <div class="card">
            <div id="history-list-container">
                <p style="text-align: center; color: var(--text-gray); padding: 20px;">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../../js/api.js"></script>
    <script src="history.js"></script>
</body>
</html>
