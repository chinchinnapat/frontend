<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Wellcare Admin - Doctors</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar-bg: #1e293b; --accent: #3b82f6; --bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg); display: flex; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 30px 15px; position: fixed; height: 100vh; }
        .sidebar h2 { color: var(--accent); margin-bottom: 30px; text-align: center; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 14px 15px; color: #94a3b8; text-decoration: none; border-radius: 10px; margin-bottom: 5px; }
        .nav-item.active { background: var(--accent); color: white; }
        .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; }
        .btn-add { background: var(--accent); color: white; padding: 12px 20px; border-radius: 10px; text-decoration: none; }
        .doctor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .doctor-card { background: white; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #e2e8f0; }
        .doctor-avatar { width: 80px; height: 80px; background: #eff6ff; color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 2rem; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>Wellcare Admin</h2>
        <nav>
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i> ภาพรวมระบบ</a>
            <a href="admin-user.html" class="nav-item"><i class="fas fa-users-cog"></i> จัดการผู้ใช้งาน</a>
            <a href="admin-doctor.html" class="nav-item active"><i class="fas fa-hospital-user"></i> รายชื่อหมอ/พยาบาล</a>
        </nav>
    </aside>
    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>จัดการรายชื่อแพทย์</h1>
            <a href="admin-add-doctor.html" class="btn-add"><i class="fas fa-plus"></i> เพิ่มรายชื่อแพทย์</a>
        </div>
        <p style="color: #64748b;">ตรวจสอบและจัดการข้อมูลแผนกแพทย์</p>
        
        <div class="doctor-grid" id="doctorDisplayGrid">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <script src="../../js/api.js"></script> 
    <script src="admin-doctor.js"></script>
</body>
</html>
